# =============================================
# TMUX CONFIGURATION (Optimized for WSL)
# =============================================

# --- General Settings ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc'
set -g history-limit 50000
set -g buffer-limit 20
set -sg escape-time 0
set -g display-time 1500
set -g remain-on-exit off
set -g repeat-time 300
setw -g allow-rename off
setw -g automatic-rename off
setw -g aggressive-resize on

# Set parent terminal title to reflect current window in tmux session 
set -g set-titles on
set -g set-titles-string "#I:#W"

# --- Interface ---
set -g mouse on

# --- Key Bindings ---
# Change prefix to Ctrl+a (easier to reach)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Copy Mode (Vim style) ---
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

# --- Status Bar ---
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour2,bg=colour235'
set -g status-left ' #S '
set -g status-left-style 'fg=colour235,bg=colour2'
set -g status-right ' %Y-%m-%d | %H:%M '
set -g status-right-length 50
set -g status-left-length 20

setw -g window-status-current-style 'fg=colour235,bg=colour2 bold'
setw -g window-status-current-format ' #I:#W#F '

setw -g window-status-style 'fg=colour2,bg=colour235'
setw -g window-status-format ' #I:#W#F '

setw -g window-status-bell-style 'fg=colour255,bg=colour1 bold'

# --- TPM (Plugins) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Automatic restore of last session
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
