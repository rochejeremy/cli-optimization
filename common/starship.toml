# Starship Prompt Configuration
# Copy to: ~/.config/starship.toml

format = """
[╭─](bold green)$username$hostname$directory$git_branch$git_status$python$nodejs$rust$golang$docker_context
[╰─](bold green)$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[$hostname](bold blue) "
disabled = false

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " 🔒"

[git_branch]
format = "on [$symbol$branch]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "yellow bold"

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold green"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "blue bold"

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "

[time]
disabled = false
format = '🕙[\[ $time \]]($style) '
time_format = "%T"
style = "bold white"

[memory_usage]
disabled = true
threshold = 75
format = "via $symbol [${ram_pct}]($style) "

[battery]
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "💀"
